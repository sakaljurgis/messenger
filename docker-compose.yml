services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - messenger-data:/data
    environment:
      - APP_ORIGIN=${APP_ORIGIN:-http://localhost:3001}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
    restart: unless-stopped

volumes:
  messenger-data:
