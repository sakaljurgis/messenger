<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <!-- Prevent a flash-of-wrong-theme: set the `.dark` class (and matching
         theme-color) from the stored choice BEFORE the app mounts. Mirrors the
         logic in src/lib/theme.ts; kept inline and dependency-free so it runs
         first. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var dark =
            mode === 'dark' ||
            (mode === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', dark ? '#111827' : '#ffffff');
        } catch (e) {}
      })();
    </script>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Messenger</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
